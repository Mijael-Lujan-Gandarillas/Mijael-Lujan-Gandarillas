name: generate snake

on:
  schedule:
    # Se regenera todos los días a las 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch: {}   # permite ejecutarlo manualmente desde la pestaña "Actions"
  push:
    branches:
      - main              # también se regenera cada vez que subes cambios

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: generate snake svg (light + dark grayscale palettes)
        uses: Platane/snk@v3
        with:
          github_user_name: Mijael-Lujan-Gandarillas
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#1a1a1a&color_dots=#e4e4e4,#b8b9ba,#8b8c8f,#58595c,#1a1a1a
            dist/github-contribution-grid-snake-dark.svg?color_snake=#ffffff&color_dots=#3a3b3d,#58595c,#838487,#b0b1b4,#f1f1f2

      - name: push svg to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
