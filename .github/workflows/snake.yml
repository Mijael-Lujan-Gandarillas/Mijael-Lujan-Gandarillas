name: generate snake

on:
  schedule:
    # Se regenera todos los días a las 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch: {}   # permite ejecutarlo manualmente desde la pestaña "Actions"
  push:
    branches:
      - main              # también se regenera cada vez que subes cambios

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: generate snake svg (grayscale palette)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23ffffff&color_dots=%233a3b3d,%2358595c,%23838487,%23b0b1b4,%23f1f1f2
            dist/github-contribution-grid-snake-dark.svg?color_snake=%23ffffff&color_dots=%233a3b3d,%2358595c,%23838487,%23b0b1b4,%23f1f1f2

      - name: push svg to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
