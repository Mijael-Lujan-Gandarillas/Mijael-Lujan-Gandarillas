name: generate stats cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: generate stats card (grayscale)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=Mijael-Lujan-Gandarillas&show_icons=true&hide_border=true&bg_color=00000000&title_color=c7c8ca&text_color=8b8c8f&icon_color=58595c
          path: .github/src/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: generate top languages card (grayscale)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=Mijael-Lujan-Gandarillas&layout=compact&hide_border=true&bg_color=00000000&title_color=c7c8ca&text_color=8b8c8f
          path: .github/src/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: generate streak card (grayscale)
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=Mijael-Lujan-Gandarillas&hide_border=true&background=00000000&ring=8b8c8f&fire=c7c8ca&currStreakLabel=c7c8ca&currStreakNum=c7c8ca&sideLabels=8b8c8f&sideNums=c7c8ca&dates=58595c&disable_animations=true
          path: .github/src/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: commit generated cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add .github/src/stats.svg .github/src/top-langs.svg .github/src/streak.svg
          git commit -m "update stats cards" || exit 0
          git push
